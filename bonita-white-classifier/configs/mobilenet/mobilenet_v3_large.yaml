# Configuración del modelo MobileNetV3-Large para clasificación de estado fenológico

model:
  name: "mobilenet_v3_large"
  num_classes: 10
  pretrained: true
  dropout_rate: 0.25  # Entre small y efficientnet
  freeze_base: false
  variant: "large"

# Mapeo de clases (10 clases - un día por clase)
class_mapping:
  0: "Dia_1"
  1: "Dia_2"
  2: "Dia_3"
  3: "Dia_4"
  4: "Dia_5"
  5: "Dia_7"
  6: "Dia_8"
  7: "Dia_9"
  8: "Dia_10"
  9: "Dia_11"

# Mapeo de días a clases (directo - cada día es su propia clase)
day_to_class:
  1: 0   # Dia_1
  2: 1   # Dia_2
  3: 2   # Dia_3
  4: 3   # Dia_4
  5: 4   # Dia_5
  7: 5   # Dia_7
  8: 6   # Dia_8
  9: 7   # Dia_9
  10: 8  # Dia_10
  11: 9  # Dia_11

# Parámetros de entrenamiento
training:
  num_epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 3
  early_stopping_patience: 10
  grad_clip: 1.0
  use_class_weights: true

# Parámetros de datos
data:
  splits_dir: "data/splits"
  batch_size: 24  # Entre small (32) y efficientnet (16)
  num_workers: 0
  image_size: 224
  pin_memory: false

# Data Augmentation
augmentation:
  train:
    horizontal_flip: 0.5
    rotation: 15
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
    random_crop: true
  val:
    center_crop: true
  test:
    center_crop: true

# Checkpoints y logging
checkpoint:
  save_dir: "checkpoints/mobilenet_large"
  save_best_only: true
  save_every: 5

logging:
  log_dir: "logs/mobilenet_large"
  tensorboard: true
  log_interval: 10