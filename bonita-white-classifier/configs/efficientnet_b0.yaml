# Configuración del modelo EfficientNet-B0 para clasificación de estado fenológico

model:
  name: "efficientnet_b0"
  num_classes: 3
  pretrained: true
  dropout: 0.3
  
# Mapeo de clases
class_mapping:
  0: "Estado_0_Prefloracion"
  1: "Estado_1_Floracion_Intermedia"
  2: "Estado_2_Floracion_Maxima"
  
# Mapeo de días a clases
day_to_class:
  dia1-4: 0  # Estado 0
  dia5-8: 1  # Estado 1
  dia9-11: 2 # Estado 2

# Parámetros de entrenamiento
training:
  batch_size: 32
  num_epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  early_stopping_patience: 10
  
# Parámetros de datos
data:
  input_size: 224
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  num_workers: 4
  pin_memory: true
  
# Data Augmentation
augmentation:
  train:
    horizontal_flip: 0.5
    rotation: 15
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
    random_crop: true
  val:
    center_crop: true
  test:
    center_crop: true

# Video processing
video:
  frames_per_video: 10
  frame_interval: 30  # Extraer frame cada N frames
  target_fps: 5
  resize_frames: true

# Checkpoints y logging
checkpoint:
  save_dir: "checkpoints"
  save_best_only: true
  monitor: "val_f1"
  mode: "max"
  
logging:
  log_dir: "logs"
  tensorboard: true
  wandb: false
  log_interval: 10

# Paths
paths:
  data_root: "data"
  raw_videos: "data/raw/videos"
  processed_frames: "data/processed/frames"
  splits: "data/splits"
  output: "output"
