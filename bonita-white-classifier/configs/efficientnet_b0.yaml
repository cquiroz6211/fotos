# Configuración del modelo EfficientNet-B0 para clasificación de estado fenológico

model:
  name: "efficientnet_b0"
  num_classes: 10
  pretrained: true
  dropout: 0.3

# Mapeo de clases (10 clases - un día por clase)
class_mapping:
  0: "Dia_1"
  1: "Dia_2"
  2: "Dia_3"
  3: "Dia_4"
  4: "Dia_5"
  5: "Dia_7"
  6: "Dia_8"
  7: "Dia_9"
  8: "Dia_10"
  9: "Dia_11"

# Mapeo de días a clases (directo - cada día es su propia clase)
day_to_class:
  1: 0   # Dia_1
  2: 1   # Dia_2
  3: 2   # Dia_3
  4: 3   # Dia_4
  5: 4   # Dia_5
  7: 5   # Dia_7
  8: 6   # Dia_8
  9: 7   # Dia_9
  10: 8  # Dia_10
  11: 9  # Dia_11

# Parámetros de entrenamiento
training:
  batch_size: 32
  num_epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  early_stopping_patience: 10
  
# Parámetros de datos
data:
  input_size: 224
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  num_workers: 4
  pin_memory: true
  
# Data Augmentation
augmentation:
  train:
    horizontal_flip: 0.5
    rotation: 15
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
    random_crop: true
  val:
    center_crop: true
  test:
    center_crop: true

# Video processing
video:
  frames_per_video: 10
  frame_interval: 30  # Extraer frame cada N frames
  target_fps: 5
  resize_frames: true

# Checkpoints y logging
checkpoint:
  save_dir: "checkpoints"
  save_best_only: true
  monitor: "val_f1"
  mode: "max"
  
logging:
  log_dir: "logs"
  tensorboard: true
  wandb: false
  log_interval: 10

# Paths
paths:
  data_root: "data"
  raw_videos: "data/raw/videos"
  processed_frames: "data/processed/frames"
  splits: "data/splits"
  output: "output"
