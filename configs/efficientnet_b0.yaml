# EfficientNet-B0 Training Configuration
# Estado fenológico Bonita White - 3 Class Classification

# Model Configuration
model:
  name: "EfficientNet-B0"
  num_classes: 3
  pretrained: true
  dropout_rate: 0.3
  freeze_base: false

# Data Configuration
data:
  # Dataset root directory
  root_dir: "./data/processed"

  # Dataset split configuration
  train_split: "train"
  val_split: "val"
  test_split: "test"

  # Image dimensions
  image_size: 224

  # Batch sizes
  batch_size: 32
  val_batch_size: 32

  # Number of workers for data loading
  num_workers: 4

  # Data augmentation for training
  augmentation:
    random_horizontal_flip: true
    random_rotation: 15
    random_affine:
      degrees: 15
      translate: [0.1, 0.1]
      scale: [0.9, 1.1]
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    random_resized_crop: true
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

  # Validation augmentation (minimal)
  val_augmentation:
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# Training Configuration
training:
  # Number of training epochs
  num_epochs: 100

  # Learning rate
  learning_rate: 0.001

  # Optimizer settings
  optimizer:
    name: "AdamW"
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 1.0e-08

  # Learning rate scheduler
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 100  # Number of epochs
    eta_min: 1.0e-06
    # Alternative: ReduceLROnPlateau
    # name: "ReduceLROnPlateau"
    # mode: "max"
    # factor: 0.5
    # patience: 10
    # min_lr: 1.0e-06

  # Loss function
  loss:
    name: "CrossEntropyLoss"
    use_class_weights: false
    label_smoothing: 0.0

  # Gradient clipping
  gradient_clipping:
    enabled: true
    max_norm: 1.0

# Early Stopping Configuration
early_stopping:
  enabled: true
  monitor: "val_loss"  # or "val_f1"
  mode: "min"  # "min" for loss, "max" for metrics
  patience: 15
  min_delta: 0.001

# Checkpointing Configuration
checkpointing:
  save_dir: "./checkpoints"
  save_frequency: 1  # Save every N epochs
  save_best_only: true
  monitor: "val_f1"
  mode: "max"
  checkpoint_name: "efficientnet_b0"

# Logging Configuration
logging:
  log_dir: "./logs"
  tensorboard_dir: "./runs"
  log_frequency: 10  # Log every N batches
  save_plots: true
  plot_frequency: 5  # Save plots every N epochs

# Device Configuration
device:
  auto_detect: true
  preferred_device: "cuda"  # "cuda", "mps", or "cpu"

# Evaluation Configuration
evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
  average: "weighted"  # "micro", "macro", "weighted"
  save_confusion_matrix: true
  save_classification_report: true

# Class names for visualization
class_names:
  - "Estado_1"
  - "Estado_2"
  - "Estado_3"

# Random seed for reproducibility
seed: 42

# Mixed precision training
mixed_precision:
  enabled: false
  dtype: "float16"  # "float16" or "bfloat16"

# Debugging
debug:
  enabled: false
  max_batches_per_epoch: 10  # For debugging: limit batches per epoch
